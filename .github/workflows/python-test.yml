name: Python Tests

on:
  push:
    branches: [main]
    paths:
      - '09-end-to-end-reference-implementation/app/**'
      - '09-end-to-end-reference-implementation/requirements.txt'
      - '.github/workflows/python-test.yml'
  pull_request:
    branches: [main]
    paths:
      - '09-end-to-end-reference-implementation/app/**'
      - '09-end-to-end-reference-implementation/requirements.txt'
      - '.github/workflows/python-test.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        working-directory: 09-end-to-end-reference-implementation
        run: pip install -r requirements.txt

      - name: Lint with Ruff
        working-directory: 09-end-to-end-reference-implementation
        run: |
          ruff check app/ --select=E9,F63,F7,F82 --show-source --statistics

      - name: Format check with Black
        working-directory: 09-end-to-end-reference-implementation
        run: black --check app/

      - name: Type check with mypy
        working-directory: 09-end-to-end-reference-implementation
        run: mypy app/ --ignore-missing-imports
        continue-on-error: true

      - name: Run unit tests
        working-directory: 09-end-to-end-reference-implementation
        run: pytest app/tests/ -v --cov=app --cov-report=xml
        continue-on-error: true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./09-end-to-end-reference-implementation/coverage.xml
          fail_ci_if_error: false
