name: Release Readiness

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  release-readiness:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install runnable baseline dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r 09-end-to-end-reference-implementation/requirements.txt
          pip install -r 05-rag-with-azure-ai-search/requirements.txt
          pip install -r 07-secure-reference-architecture/requirements.txt
          pip install -r 08-observability-and-evaluation/requirements.txt
          pip install ruff

      - name: Smoke validation
        run: |
          pwsh ./tests/smoke/smoke-validate.ps1

      - name: Validate release-facing docs
        run: |
          test -f CHANGELOG.md
          test -f KNOWN-LIMITATIONS.md
          test -f RELEASE-CHECKLIST.md
          test -f RELEASE-STRATEGY.md
          test -f VALIDATION-MATRIX.md
          test -f docs/releases/v0.1.0-alpha.md

      - name: Bicep and policy checks
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          files = [
              Path("09-end-to-end-reference-implementation/infra/environments/dev.parameters.json"),
              Path("09-end-to-end-reference-implementation/infra/environments/test.parameters.json"),
              Path("09-end-to-end-reference-implementation/infra/environments/prod.parameters.json"),
              Path("policy/azure-policy/definitions/https-only.json"),
              Path("policy/azure-policy/definitions/minimum-tls.json"),
              Path("policy/azure-policy/definitions/public-network-access-audit.json"),
          ]
          for path in files:
              json.loads(path.read_text())
              print(f"OK:{path}")
          PY
