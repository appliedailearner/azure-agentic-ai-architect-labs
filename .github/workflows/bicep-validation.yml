name: Bicep Validation

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate-bicep:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure CLI available
        uses: azure/cli@v2
        with:
          inlineScript: |
            az bicep version

      - name: Build runnable baseline Bicep files
        run: |
          az bicep build --file 09-end-to-end-reference-implementation/infra/main.bicep
          az bicep build --file 05-rag-with-azure-ai-search/infra/main.bicep
          az bicep build --file 07-secure-reference-architecture/infra/main.bicep
          az bicep build --file 08-observability-and-evaluation/infra/main.bicep

      - name: Validate parameter files and policy definitions are valid JSON
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          files = [
              Path("09-end-to-end-reference-implementation/infra/environments/dev.parameters.json"),
              Path("09-end-to-end-reference-implementation/infra/environments/test.parameters.json"),
              Path("09-end-to-end-reference-implementation/infra/environments/prod.parameters.json"),
              Path("policy/azure-policy/definitions/https-only.json"),
              Path("policy/azure-policy/definitions/minimum-tls.json"),
              Path("policy/azure-policy/definitions/public-network-access-audit.json"),
          ]
          for path in files:
              json.loads(path.read_text())
              print(f"OK:{path}")
          PY
