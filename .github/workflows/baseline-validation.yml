name: Baseline Validation

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install module 09 dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r 09-end-to-end-reference-implementation/requirements.txt

      - name: Verify top-level docs exist
        run: |
          test -f README.md
          test -f QUICK-START.md
          test -f MODULE-STATUS.md
          test -f REFERENCE-ARCHITECTURE.md

      - name: Run module 09 tests
        env:
          PYTHONPATH: 09-end-to-end-reference-implementation
        run: |
          pytest 09-end-to-end-reference-implementation/app/tests -q

      - name: Lint module 09 with Ruff
        run: |
          ruff check 09-end-to-end-reference-implementation/app/agent.py
