name: Baseline Validation

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install runnable baseline dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r 09-end-to-end-reference-implementation/requirements.txt
          pip install -r 05-rag-with-azure-ai-search/requirements.txt
          pip install -r 07-secure-reference-architecture/requirements.txt
          pip install -r 08-observability-and-evaluation/requirements.txt

      - name: Verify top-level docs exist
        run: |
          test -f README.md
          test -f QUICK-START.md
          test -f MODULE-STATUS.md
          test -f REFERENCE-ARCHITECTURE.md

      - name: Run smoke validation
        run: |
          pwsh ./tests/smoke/smoke-validate.ps1

      - name: Lint runnable baselines with Ruff
        run: |
          ruff check 09-end-to-end-reference-implementation/app/agent.py
          ruff check 05-rag-with-azure-ai-search/app/main.py
          ruff check 07-secure-reference-architecture/app/main.py
          ruff check 08-observability-and-evaluation/app/main.py
