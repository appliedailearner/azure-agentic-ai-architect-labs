name: Code Quality

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  quality:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black isort pylint mypy
    
    - name: Check code formatting with black
      run: |
        black --check 09-end-to-end-reference-implementation/app --line-length=100 || true
    
    - name: Check import order with isort
      run: |
        isort --check-only 09-end-to-end-reference-implementation/app || true
    
    - name: Lint with pylint
      run: |
        pip install pylint
        pylint 09-end-to-end-reference-implementation/app --disable=all --enable=E,F --exit-zero || true
    
    - name: Security check with bandit
      run: |
        pip install bandit
        bandit -r 09-end-to-end-reference-implementation/app -f json -o bandit-report.json || true
    
    - name: SBOM generation
      run: |
        pip install cyclonedx-bom
        cyclonedx-bom -o cyclonedx.json
    
    - name: Comment PR with results
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: '✅ Code quality checks completed\n- Black formatting\n- Import sorting (isort)\n- Linting\n- Security analysis (bandit)'
          })
      continue-on-error: true
