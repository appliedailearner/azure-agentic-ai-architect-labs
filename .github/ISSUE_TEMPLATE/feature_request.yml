name: Feature request
description: Request a repo improvement tied to architecture, validation, security, or operations.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: Explain the gap or friction clearly.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: State the improvement you want.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence or references
      description: Link docs, failing paths, or design references if relevant.
